<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de administrador - AdSenseDesdeCero">
    <title>Login Admin | AdSenseDesdeCero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .hero-bg {
            background: linear-gradient(92deg, #10b981 0%, #059669 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Login Container -->
    <div class="min-h-screen flex items-center justify-center px-4 hero-bg">
        <div class="w-full max-w-md">
            <!-- Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-10">
                <!-- Logo -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-3xl mb-4">
                        <span class="text-4xl">🔐</span>
                    </div>
                    <h1 class="heading-font text-3xl font-semibold text-gray-900">Admin Panel</h1>
                    <p class="text-gray-600 mt-2">AdSenseDesdeCero</p>
                </div>

                <!-- Form -->
                <form id="loginForm" class="space-y-6">
                    <!-- Usuario -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Usuario
                        </label>
                        <input 
                            type="text" 
                            id="email" 
                            placeholder="admin"
                            required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-100"
                        >
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Contraseña
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-100"
                        >
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit"
                        class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-2xl transition flex items-center justify-center gap-2"
                    >
                        <span id="btnText">Iniciar sesión</span>
                    </button>
                </form>

                <!-- Error Message -->
                <div id="errorMsg" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm hidden">
                    <strong>Error:</strong> <span id="errorText"></span>
                </div>

                <!-- Success Message -->
                <div id="successMsg" class="mt-6 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl text-emerald-700 text-sm hidden">
                    ✅ ¡Iniciando sesión... Espera un momento.
                </div>

                <!-- Info Box -->
                <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-2xl text-sm text-blue-700">
                    <strong>Credenciales de acceso:</strong><br>
                    Usuario: <code>admin</code><br>
                    Contraseña: <code>admin123</code>
                </div>

                <!-- Back Link -->
                <div class="text-center mt-6">
                    <a href="index.html" class="text-emerald-600 hover:text-emerald-700 font-medium">
                        ← Volver al sitio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Credenciales "cifradas" (usuario: admin, contraseña: admin123)
        const ADMIN_USER = 'YWRtaW4='; // btoa('admin')
        const ADMIN_PASS = 'YWRtaW4xMjM='; // btoa('admin123')
        const SALT = 'AdSense2026'; // Sal básica

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            const btnText = document.getElementById('btnText');
            const originalBtnText = btnText.textContent;

            // Clear messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            // Validate
            if (!email || !password) {
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = 'Por favor completa todos los campos.';
                return;
            }

            if (password.length < 6) {
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = 'La contraseña debe tener al menos 6 caracteres.';
                return;
            }

            // Show loading
            btnText.textContent = 'Verificando...';
            document.querySelector('button[type="submit"]').disabled = true;
            successDiv.classList.remove('hidden');

            // Simular verificación
            setTimeout(() => {
                try {
                    // Verificar credenciales "cifradas"
                    const hashedInput = btoa(password + SALT);
                    const validUser = atob(ADMIN_USER) === email;
                    const validPass = btoa(atob(ADMIN_PASS) + SALT) === hashedInput;

                    if (validUser && validPass) {
                        // Guardamos info en sessionStorage
                        sessionStorage.setItem('admin_user', JSON.stringify({
                            email: email,
                            loginTime: new Date().toISOString()
                        }));
                        
                        setTimeout(() => {
                            window.location.href = 'adminpanel.html';
                        }, 1500);
                    } else {
                        throw new Error('Credenciales incorrectas');
                    }
                } catch (err) {
                    btnText.textContent = originalBtnText;
                    document.querySelector('button[type="submit"]').disabled = false;
                    successDiv.classList.add('hidden');
                    errorDiv.classList.remove('hidden');
                    document.getElementById('errorText').textContent = err.message || 'Error de autenticación. Intenta de nuevo.';
                }
            }, 1000);
        });

        // Check if redirected from logout
        if (sessionStorage.getItem('logoutMessage')) {
            const msg = document.createElement('div');
            msg.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-2xl shadow-lg';
            msg.textContent = '✅ Sesión cerrada correctamente';
            document.body.appendChild(msg);
            sessionStorage.removeItem('logoutMessage');
            setTimeout(() => msg.remove(), 3000);
        }
    </script>
</body>
</html>
